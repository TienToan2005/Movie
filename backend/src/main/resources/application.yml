spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:movie_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Cấu hình Gửi Mail OTP
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL}
    password: ${APP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # Cấu hình Redis Cache
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

# Cấu hình Lưu trữ ảnh/video
cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_KEY}
  api-secret: ${CLOUDINARY_SECRET}

# Cấu hình API Phim ngoại (TMDB)
tmdb:
  api-key: ${TMDB_KEY}
  base-url: https://api.themoviedb.org/3
  image-base-url: https://image.tmdb.org/t/p/original

# Cấu hình Bảo mật JWT (Rất quan trọng cho ATTT)
jwt:
  signerKey: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000} # Mặc định 1 giờ

# Cấu hình Nhật ký (Logging) để Debug
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    com.tientoan21.WebMovie: DEBUG
    org.springframework.security: DEBUG # Soi lỗi chặn/cho phép của Security
    org.springframework.web.client.RestTemplate: DEBUG # Soi lỗi gọi API TMDB

server:
  port: 8080