version: '3.8'

services:
  # 1. Database (MySQL)
  db:
    image: mysql:8.0
    container_name: movie_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Cache (Redis)
  redis:
    image: redis:alpine
    container_name: movie_redis
    restart: always
    ports:
      - "6379:6379"

  # 3. Backend (Spring Boot)
  backend:
    build: ./backend
    container_name: movie_backend
    restart: always
    ports:
      - "${BE_PORT}:8080"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - EMAIL=${EMAIL}
      - APP_PASS=${APP_PASS}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_KEY=${CLOUDINARY_KEY}
      - CLOUDINARY_SECRET=${CLOUDINARY_SECRET}
      - TMDB_KEY=${TMDB_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
    depends_on:
      - db
      - redis

  # 4. Frontend (Next.js)
  frontend:
    build: ./frontend
    container_name: movie_frontend
    restart: always
    ports:
      - "${FE_PORT}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BE_PORT}
    depends_on:
      - backend

volumes:
  mysql_data: